function b64d(s){ const bin=atob(s); const u=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++) u[i]=bin.charCodeAt(i); return u; }
async function unlock(pw){
  try{
    const enc=new TextEncoder();
    const km=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);
    const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b64d(SALT),iterations:200000,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
    const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64d(IV)},key,b64d(CT));
    const html=new TextDecoder().decode(pt);
    try{ localStorage.setItem("qauk",pw); }catch(e){}
    document.open(); document.write(html); document.close();
    return true;
  }catch(e){ return false; }
}
const pwEl=document.getElementById("pw"), errEl=document.getElementById("err");
async function tryUnlock(pw){ errEl.textContent="解密中…"; const ok=await unlock(pw); if(!ok){ errEl.textContent="密碼錯誤，再試一次"; pwEl.value=""; pwEl.focus(); } }
document.getElementById("go").addEventListener("click",()=>tryUnlock(pwEl.value));
pwEl.addEventListener("keydown",e=>{ if(e.key==="Enter") tryUnlock(pwEl.value); });
(function(){ var saved=null; try{ saved=localStorage.getItem("qauk"); }catch(e){} if(saved) unlock(saved); })();
</script>
